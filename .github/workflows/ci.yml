name: CI — Recommendation Engine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 bandit pip-audit
      - name: Lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
      - name: SAST (Bandit)
        run: bandit -r . -ll -ii || true
      - name: Dependency Audit
        run: if [ -f requirements.txt ]; then pip-audit -r requirements.txt || true; fi
